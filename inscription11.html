<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - Institut Al-Quran</title>
    <!-- Styles identiques -->
</head>
<body>
    <!-- Bouton Accueil Fixe -->
    <a href="index.html" class="back-home"><i class="fas fa-home"></i></a>

    <section class="section" style="max-width: 500px; margin-top: 100px;">
        <h2 class="section-title">تسجيل جديد</h2>
        
        <form id="inscriptionForm" class="feature-card">
            <div style="margin-bottom: 1.5rem;">
                <label>الاسم الكامل</label>
                <input type="text" id="nom" required class="form-input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label>البريد الإلكتروني</label>
                <input type="email" id="email" required class="form-input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label>رقم الهاتف</label>
                <input type="tel" id="telephone" required class="form-input">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label>كلمة المرور</label>
                <input type="password" id="password" required class="form-input">
            </div>
            
            <div id="paiementSection" style="display: none;">
                <h3>معلومات الدفع</h3>
                <div style="margin-bottom: 1.5rem;">
                    <label>رقم البطاقة</label>
                    <input type="text" id="carte" placeholder="1234 5678 9012 3456" required class="form-input">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
                    <div>
                        <label>تاريخ الانتهاء</label>
                        <input type="text" id="date" placeholder="MM/YY" required class="form-input">
                    </div>
                    <div>
                        <label>CVV</label>
                        <input type="text" id="cvv" placeholder="123" required class="form-input">
                    </div>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" class="cta-button" style="width: 100%;">
                إتمام التسجيل
            </button>
        </form>

        <div id="message" style="margin-top: 1rem; padding: 1rem; border-radius: 10px; text-align: center; display: none;"></div>
    </section>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const niveau = urlParams.get('niveau');
        const paiementSection = document.getElementById('paiementSection');
        const submitBtn = document.getElementById('submitBtn');
        
        // Afficher section paiement si niveau payant
        if (niveau && niveau != '1') {
            paiementSection.style.display = 'block';
            submitBtn.textContent = `دفع ${niveau == '2' ? '99€' : '199€'} وإتمام`;
        }

        document.getElementById('inscriptionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const data = {
                nom: document.getElementById('nom').value,
                email: document.getElementById('email').value,
                telephone: document.getElementById('telephone').value,
                password: document.getElementById('password').value,
                niveau: niveau,
                date: new Date().toISOString()
            };

            // Simulation enregistrement + email
            submitBtn.textContent = 'جاري المعالجة...';
            submitBtn.disabled = true;

            setTimeout(() => {
                // Redirection selon le niveau
                if (niveau == '1') {
                    // Niveau gratuit -> Interface client
                    localStorage.setItem('clientData', JSON.stringify(data));
                    window.location.href = `client.html?id=${data.email}`;
                } else {
                    // Niveau payant -> Confirmation paiement
                    alert('✅ الدفع تم بنجاح! تحقق من بريدك الإلكتروني');
                    localStorage.setItem('clientData', JSON.stringify(data));
                    window.location.href = `client.html?id=${data.email}`;
                }
            }, 2000);
        });
    </script>
</body>
</html>
