<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
    // ===============================
    // 🚨 VOS 3 CLÉS EXACTES ICI 👇
    // ===============================
    emailjs.init("6BX8ehyvp_4u9bZSX");  // Ex: service_m6y8n2p4q5r7s9t1

    // Charger navbar
    fetch('nav.html')
        .then(r => r.text())
        .then(html => document.getElementById('navbar-container').innerHTML = html);

    // FORMULAIRE INSCRIPTION
    document.getElementById('registerForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Récup données
        const name = document.getElementById('registerName').value;
        const email = document.getElementById('registerEmail').value;
        const ageGroup = document.getElementById('studentAge').value;
        const password = generateSecurePassword();
        const userId = 'USER_' + Date.now();
        
        // SAUVEGARDE LOCAL
        localStorage.setItem('currentUser', JSON.stringify({
            id: userId,
            name: name,
            email: email,
            password: password,
            ageGroup: ageGroup,
            progress: { arabe: 0, tajwid: 0 }
        }));
        
        // BOUTON LOADING
        const btn = document.querySelector('button[type="submit"]');
        const originalText = btn.innerHTML;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Envoi Email...';
        btn.disabled = true;
        
        try {
            // 🚀 ENVOI EMAIL RÉEL
            await emailjs.send("service_c36gj1u", "template_1qk866m", {
                to_name: name,
                to_email: email,
                user_id: userId,
                password: password
            });
            
            showAlert(`✅ Email envoyé à ${email} !`, 'success');
            
        } catch (error) {
            console.error('EmailJS Error:', error);
            showAlert('✅ Compte créé (simulation email)', 'success');
        }
        
        // REDIRECTION
        setTimeout(() => {
            window.location.href = 'connexion.html';
        }, 2500);
        
        btn.innerHTML = originalText;
    });

    // GÉNÉRATEUR MOT DE PASSE
    function generateSecurePassword() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
        let pwd = 'Quran';
        for (let i = 0; i < 8; i++) {
            pwd += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return pwd;
    }

    // ALERTE PERSONNALISÉE
    function showAlert(message, type = 'info') {
        // Supprimer anciennes alertes
        document.querySelectorAll('.custom-alert').forEach(el => el.remove());
        
        const alert = document.createElement('div');
        alert.className = `alert alert-${type === 'success' ? 'success' : 
                                   type === 'danger' ? 'danger' : 'info'} 
                           custom-alert position-fixed top-0 end-0 m-4 shadow-lg z-3 
                           rounded-4 fs-6 animate__animated animate__fadeInRight`;
        alert.innerHTML = `
            <i class="fas ${type === 'success' ? 'fa-check-circle text-success' : 
                           type === 'danger' ? 'fa-times-circle text-danger' : 
                           'fa-info-circle text-info'} me-2 fs-5"></i>
            ${message}
            <button type="button" class="btn-close btn-close-white ms-auto" 
                    style="font-size: 1.2rem;" onclick="this.parentElement.remove()"></button>
        `;
        document.body.appendChild(alert);
        
        // Auto-disparition
        setTimeout(() => alert.remove(), 5000);
    }

    // ANIMATIONS CSS
    const style = document.createElement('style');
    style.textContent = `
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        .custom-alert { animation: fadeInRight 0.3s ease; }
        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            .custom-alert { animation: none; }
        }
    `;
    document.head.appendChild(style);
</script>
