<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <!-- HEAD complet (déjà fourni) -->
</head>
<body>
    <!-- TOUT LE HTML (déjà fourni) -->
    
    <script>
        let currentNiveau = 1;
        let clientInscrit = null;

        // Vérifier si un client existe déjà au chargement
        window.addEventListener('load', function() {
            const savedClient = localStorage.getItem('clientQuranData');
            if (savedClient) {
                clientInscrit = JSON.parse(savedClient);
            }
        });

        // Afficher section inscription
        function showInscription(niveau) {
            currentNiveau = niveau;
            document.getElementById('titreInscription').textContent = 
                niveau === 1 ? 'المستوى 1 🆓 مجاني' : `المستوى ${niveau}`;
            document.getElementById('btnSubmit').textContent = 
                niveau === 1 ? '🚀 تسجيل مجاني فوري' : `💳 دفع ${niveau === 2 ? '99€' : '199€'}`;
            
            // Reset form
            document.getElementById('formInscription').reset();
            document.getElementById('message').style.display = 'none';
            
            showSection('inscription');
        }

        // Navigation sections
        function showSection(sectionId) {
            document.querySelectorAll('.section').forEach(section => {
                section.classList.remove('active');
                section.style.display = 'none';
            });
            document.getElementById(sectionId).style.display = 'flex';
            document.getElementById(sectionId).classList.add('active');
            window.scrollTo(0, 0);
        }

        // FORMULAIRE INSCRIPTION - COMPLET
        document.getElementById('formInscription').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const nom = document.getElementById('nom').value.trim();
            const email = document.getElementById('email').value.trim();
            const telephone = document.getElementById('telephone').value.trim();
            const password = document.getElementById('password').value;
            
            const btnSubmit = document.getElementById('btnSubmit');
            const message = document.getElementById('message');
            
            // Validation
            if (!nom || !email || !telephone || password.length < 6) {
                alert('يرجى ملء جميع الحقول وكلمة مرور 6 أحرف على الأقل');
                btnSubmit.disabled = false;
                btnSubmit.textContent = currentNiveau === 1 ? '🚀 تسجيل مجاني فوري' : `💳 دفع ${currentNiveau === 2 ? '99€' : '199€'}`;
                return;
            }
            
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '⏳ جاري التسجيل...';
            
            setTimeout(() => {
                clientInscrit = {
                    nom, email, telephone, password, niveau: currentNiveau,
                    identifiant: email,
                    motDePasse: password,
                    date: new Date().toLocaleString('ar-TN')
                };
                
                localStorage.setItem('clientQuranData', JSON.stringify(clientInscrit));
                
                message.style.display = 'block';
                message.className = 'message success';
                message.innerHTML = `
                    <div style="font-size: 1.3rem; margin-bottom: 1rem;">
                        🎉 <strong>التسجيل ناجح 100%!</strong>
                    </div>
                    <div style="background: white; padding: 1.5rem; border-radius: 15px; margin: 1rem 0; box-shadow: 0 5px 15px rgba(0,0,0,0.1);">
                        <h3 style="color: #28a745; margin-bottom: 1rem;">📧 بيانات الدخول:</h3>
                        <div style="text-align: center; line-height: 2;">
                            <strong>👤 Identifiant:</strong> <span style="color: #ff6b35; font-size: 1.2rem;">${email}</span><br>
                            <strong>🔑 Mot de passe:</strong> <span style="color: #ff6b35; font-size: 1.2rem;">${password}</span><br>
                            <strong>⭐ المستوى:</strong> <span style="color: #4CAF50; font-size: 1.2rem;">المستوى ${currentNiveau}</span>
                        </div>
                    </div>
                    <button onclick="goToDashboard()" class="submit-btn" style="margin-top: 1rem;">
                        🚀 دخول لوحة التحكم
                    </button>
                `;
                
                message.scrollIntoView({ behavior: 'smooth' });
            }, 1500);
        });

        // Aller au dashboard - COMPLET
        function goToDashboard() {
            if (clientInscrit) {
                // Remplir infos client
                document.getElementById('nomClient').textContent = clientInscrit.nom;
                document.getElementById('emailClient').textContent = clientInscrit.identifiant;
                document.getElementById('passClient').textContent = clientInscrit.motDePasse;
                document.getElementById('niveauClient').textContent = `المستوى ${clientInscrit.niveau}`;
                
                // Cours selon niveau
                const coursData = {
                    1: ['📖 تجويد أساسي', '📖 تلاوة السور القصيرة', '📖 مخارج الحروف', '📖 الوقف والابتداء'],
                    2: ['📖 تجويد متقدم', '📖 حفظ السور المتوسطة', '📖 قواعد التجويد', '📖 أحكام النون والميم'],
                    3: ['📖 حفظ كامل للقرآن', '📖 تفسير القرآن', '📖 تجويد احترافي', '📖 تدريس متقدم']
                };
                
                const coursList = document.getElementById('coursList');
                const mesCours = coursData[clientInscrit.niveau] || [];
                
                coursList.innerHTML = mesCours.map(cours => 
                    `<div class="cours-item">${cours}</div>`
                ).join('');
                
                showSection('client');
            }
        }

        // Effacer les données (pour test)
        function clearData() {
            if (confirm('هل تريد حذف جميع البيانات؟')) {
                localStorage.removeItem('clientQuranData');
                clientInscrit = null;
                showSection('accueil');
                alert('تم حذف البيانات بنجاح');
            }
        }

        // Ajouter bouton reset dans dashboard (optionnel)
        console.log('Institut Al-Quran - Prêt ✅');
    </script>
</body>
</html>
