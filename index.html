<!DOCTYPE html>
<html lang="fr" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Institut Al-Quran</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [Mêmes styles que précédemment + bouton accueil fixe] */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Cairo', sans-serif; line-height: 1.6; color: #333; direction: rtl; }

        /* Bouton Accueil Fixe */
        .back-home {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: 0 5px 20px rgba(255,107,53,0.4);
            z-index: 9999;
            text-decoration: none;
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .back-home:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 30px rgba(255,107,53,0.6);
        }

        @keyframes pulse {
            0% { box-shadow: 0 5px 20px rgba(255,107,53,0.4); }
            50% { box-shadow: 0 5px 20px rgba(255,107,53,0.7); }
            100% { box-shadow: 0 5px 20px rgba(255,107,53,0.4); }
        }

        /* Reste des styles identiques au précédent */
        /* ... */
    </style>
</head>
<body>
    <!-- Bouton Accueil Fixe -->
    <a href="index.html" class="back-home" title="Accueil">
        <i class="fas fa-home"></i>
    </a>

    <!-- Header + Hero + Sections (identique au précédent) -->
    
    <!-- Section Inscription -->
    <section class="section" id="inscription">
        <h2 class="section-title">تسجيل الدخول / التسجيل</h2>
        <div style="max-width: 500px; margin: 0 auto;">
            <div class="feature-card" style="padding: 2rem;">
                <h3>اختر مستواك</h3>
                <div style="display: grid; gap: 1rem; margin-top: 1.5rem;">
                    <a href="inscription.html?niveau=1" class="cta-button" style="background: #4CAF50;">
                        <i class="fas fa-crown"></i> المستوى 1 - مجاني
                    </a>
                    <a href="inscription.html?niveau=2" class="cta-button" style="background: #ff6b35;">
                        <i class="fas fa-star"></i> المستوى 2 - 99€
                    </a>
                    <a href="inscription.html?niveau=3" class="cta-button" style="background: #1e3c72;">
                        <i class="fas fa-gem"></i> المستوى 3 - 199€
                    </a>
                </div>
                <p style="margin-top: 1rem; font-size: 0.9rem; opacity: 0.8;">
                    <i class="fas fa-check-circle"></i> المستوى 1 مجاني تماماً
                </p>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script>
        // Script menu + scroll (identique)
    </script>
</body>
</html>
