<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - مدرسة القرآن</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #D4AF37;
            --primary-green: #1B5E20;
        }
        .page-hero { background: linear-gradient(135deg, var(--primary-gold), var(--primary-green)); color: white; }
        .card-register { box-shadow: 0 20px 60px rgba(0,0,0,0.15); border-radius: 20px; }
        .btn-register { background: linear-gradient(45deg, var(--primary-gold), #FAD02C); border: none; }
    </style>
</head>
<body>
    <!-- NAVIGATION -->
    <div id="navbar-container"></div>
    
    <!-- HERO INSCRIPTION -->
    <section class="page-hero py-5">
        <div class="container">
            <nav class="breadcrumb-custom">
                <ol class="breadcrumb mb-0">
                    <li class="breadcrumb-item"><a href="index.html" class="text-white">Accueil</a></li>
                    <li class="breadcrumb-item active text-white" aria-current="page">Inscription</li>
                </ol>
            </nav>
            <div class="row align-items-center mt-4">
                <div class="col-lg-6">
                    <h1 class="display-4 fw-bold mb-3 arabic-text">التسجيل المجاني</h1>
                    <h1 class="display-4 fw-bold mb-4">Inscription Gratuite</h1>
                    <p class="lead mb-0">Rejoignez +5 000 étudiants du monde entier</p>
                    <div class="mt-4">
                        <div class="d-flex align-items-center mb-2">
                            <i class="fas fa-check-circle text-success me-2"></i>
                            <strong>Accès immédiat aux premiers cours</strong>
                        </div>
                        <div class="d-flex align-items-center">
                            <i class="fas fa-check-circle text-success me-2"></i>
                            <strong>Envoi automatique de vos identifiants</strong>
                        </div>
                    </div>
                </div>
                <div class="col-lg-6 text-center">
                    <img src="https://images.unsplash.com/photo-1576168215506-fba07a93781e?w=500&h=400&fit=crop" 
                         alt="Enfant Coran" class="img-fluid rounded-4 shadow-lg" style="max-height: 400px;">
                </div>
            </div>
        </div>
    </section>
    
    <!-- FORMULAIRE INSCRIPTION -->
    <main class="container my-5 pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-xl-5">
                <div class="card card-register overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-5">
                            <i class="fas fa-user-plus fa-4x text-primary mb-4"></i>
                            <h3 class="arabic-text mb-2">إنشاء حساب جديد</h3>
                            <h4>Créer mon compte</h4>
                        </div>
                        
                        <!-- FORMULAIRE -->
                        <form id="registerForm">
                            <div class="mb-4">
                                <label class="form-label fw-bold fs-5 mb-2">👤 Nom complet</label>
                                <input type="text" class="form-control form-control-lg rounded-4" 
                                       id="registerName" placeholder="Ahmed Benali" required>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label fw-bold fs-5 mb-2">📧 Email</label>
                                <input type="email" class="form-control form-control-lg rounded-4" 
                                       id="registerEmail" placeholder="ahmed@email.com" required>
                            </div>
                            
                            <div class="mb-5">
                                <label class="form-label fw-bold fs-5 mb-2">🎓 Âge de l'élève</label>
                                <select class="form-select form-select-lg rounded-4" id="studentAge">
                                    <option value="enfant">👶 Enfant (5-12 ans)</option>
                                    <option value="ado">🧒 Adolescent (13-17 ans)</option>
                                    <option value="adulte">👨‍🎓 Adulte</option>
                                </select>
                            </div>
                            
                            <button type="submit" class="btn btn-register btn-lg w-100 py-3 rounded-4 shadow-lg fs-5 fw-bold">
                                <i class="fas fa-rocket me-2"></i>
                                S'INSCRIRE GRATUITEMENT
                            </button>
                        </form>
                        
                        <div class="text-center mt-5 pt-4 border-top">
                            <p class="mb-0">
                                <i class="fas fa-shield-alt text-success me-1"></i>
                                100% sécurisé • Pas de spam • 
                                <a href="#" class="text-decoration-none">Conditions</a>
                            </p>
                            <p class="text-muted mt-2">
                                Déjà inscrit ? 
                                <a href="connexion.html" class="text-primary fw-bold text-decoration-none">
                                    Se connecter ici →
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- BOOTSTRAP -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JS INSCRIPTION -->
    <script>
        // Charger navbar
        fetch('nav.html')
            .then(r => r.text())
            .then(html => document.getElementById('navbar-container').innerHTML = html);

        // Fonction inscription (copiée du JS principal)
        function generateSecurePassword() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnpqrstuvwxyz23456789';
            let password = 'Quran';
            for (let i = 0; i < 8; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return password;
        }

        function showAlert(message, type = 'info') {
            const alert = document.createElement('div');
            alert.className = `alert alert-${type} position-fixed top-0 end-0 m-4 shadow-lg z-3 rounded-4`;
            alert.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-triangle'} me-2"></i>${message}`;
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 5000);
        }

        // Submit formulaire
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const ageGroup = document.getElementById('studentAge').value;
            const password = generateSecurePassword();
            
            const user = {
                id: 'USER_' + Date.now(),
                name: name,
                email: email,
                password: password,
                ageGroup: ageGroup
            };
            
            // Sauvegarde local
            localStorage.setItem('currentUser', JSON.stringify(user));
            
            // Simulation email
            const btn = document.querySelector('button[type="submit"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Inscription...';
            btn.disabled = true;
            
            setTimeout(() => {
                showAlert(`✅ ${name} ! Vos identifiants ont été envoyés à ${email}`, 'success');
                btn.innerHTML = originalText;
                btn.disabled = false;
                
                // Redirection connexion
                setTimeout(() => {
                    window.location.href = 'connexion.html';
                }, 2000);
            }, 2000);
        });
    </script>
</body>
</html>
